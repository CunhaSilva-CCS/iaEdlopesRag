services:
  - type: web
    name: raged-chat
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 180
    healthCheckPath: /healthz
    envVars:
      - key: OPENAI_API_KEY
        sync: false
