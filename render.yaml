services:
  - type: web
    name: raged-chat
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 180
    healthCheckPath: /healthz
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: RAG_INITIAL_INDEX_MAX_FILES
        value: "8"
      - key: RAG_BOOTSTRAP_MAX_SECONDS
        value: "90"
      - key: RAG_INIT_MAX_SECONDS
        value: "240"
      - key: RAG_INIT_RETRY_SECONDS
        value: "45"
